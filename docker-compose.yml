version: "3.8"

services:
  # ============================================================
  # FRONTEND ONLY
  # ============================================================
  # The FastAPI services (kgbuilder-api, graphqa-api, ontology-api)
  # are expected to be running separately (either standalone repo containers
  # or in their own deployments). The frontend references them via environment
  # variables and http://service-name:port within the same network.
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kgplatform-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - KGBUILDER_API_URL=http://kgbuilder-api:8001
      - GRAPHQA_API_URL=http://graphqa-api:8002
      - ONTOLOGY_API_URL=http://ontology-api:8003
    depends_on:
      - neo4j
      - qdrant
      - fuseki
    networks:
      - kgplatform

  # ============================================================
  # SHARED INFRASTRUCTURE — all services use these
  # ============================================================

  neo4j:
    image: neo4j:5.26.0
    container_name: kgplatform-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc", "n10s"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
    volumes:
      - ./data/neo4j:/data
      - neo4j-plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - kgplatform

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kgplatform-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - kgplatform

  fuseki:
    image: stain/jena-fuseki:latest
    container_name: kgplatform-fuseki
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - ./data/fuseki:/fuseki
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:-admin}
    networks:
      - kgplatform

  # ============================================================
  # OLLAMA INSTANCES — one per service (separate model configs)
  # ============================================================

  ollama-kgbuilder:
    image: ollama/ollama:0.14.3
    container_name: ollama-kgbuilder
    restart: unless-stopped
    ports:
      - "18134:11434"
    volumes:
      - ollama-kgbuilder-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_DOWNLOADS=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - kgplatform

  ollama-graphqa:
    image: ollama/ollama:0.14.3
    container_name: ollama-graphqa
    restart: unless-stopped
    ports:
      - "18136:11434"
    volumes:
      - ollama-graphqa-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_DOWNLOADS=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - kgplatform

  ollama-ontology:
    image: ollama/ollama:0.14.3
    container_name: ollama-ontology
    restart: unless-stopped
    ports:
      - "18135:11434"
    volumes:
      - ollama-ontology-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_DOWNLOADS=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - kgplatform

volumes:
  neo4j-plugins:
  ollama-kgbuilder-data:
  ollama-graphqa-data:
  ollama-ontology-data:

networks:
  kgplatform:
    driver: bridge
